<!DOCTYPE html>
<html>
<head>
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        nav {
            background-color: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: yellow;
        }

        img {
            width: 300px;
            margin-top: 10px;
        }

        form {
            margin-top: 20px;
        }

        input {
            padding: 8px;
        }

        button {
            padding: 8px;
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Paragraph -->
    <p>This is my first webpage created using HTML and CSS.</p>

    <!-- Image -->
    <img src="https://via.placeholder.com/300" alt="Sample Image">

    <!-- Form -->
    <form>
        <input type="text" placeholder="Enter your name">
        <button type="submit">Submit</button>
    </form>

</body>
</html>
