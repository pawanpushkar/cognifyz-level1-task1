<!DOCTYPE html>
<html>
<head>
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background-color: #f5f5f5;
        }

        nav {
            background-color: #333;
            padding: 10px;
            border-radius: 5px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        h1 {
            margin-top: 20px;
        }

        img {
            width: 400px;
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        form {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Paragraph -->
    <p>This is my first webpage created using HTML and CSS.</p>

    <!-- Image -->
    <img src="image.jpg" alt="My Image">

    <!-- Form -->
    <form>
        <input type="text" placeholder="Enter your name">
        <button type="submit">Submit</button>
    </form>

</body>
</html>
